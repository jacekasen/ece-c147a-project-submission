# @package _global_
module:
  _target_: emg2qwerty.lightning.ResNetLSTMCTCModule
  hidden_size: 512   # LSTM hidden size; output = 1024 when bidirectional=True
  num_lstm_layers: 2
  dropout: 0.1
  bidirectional: true

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000  # 4 sec windows for 2kHz EMG
  padding: [1800, 200]  # 900ms past context, 100ms future context
